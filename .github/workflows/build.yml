name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14
      GLAZE_REF: main

    steps:
      - uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 clang \
            cmake ninja-build pkg-config git ca-certificates \
            libpcre2-dev libcurl4-openssl-dev libarchive-dev \
            libpugixml-dev libcli11-dev catch2
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
                                  --slave   /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Cache third-party installs
        id: cache-thirdparty
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty-install
          key: thirdparty-${{ runner.os }}-glaze-${{ env.GLAZE_REF }}-v4

      - name: Build & install glaze
        if: steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$GLAZE_REF" https://github.com/stephenberry/glaze.git /tmp/glaze
          cmake -S /tmp/glaze -B /tmp/glaze/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/thirdparty-install" \
            -Dglaze_BUILD_EXAMPLES=OFF
          cmake --install /tmp/glaze/build

      - name: Configure
        env:
          CPATH: ${{ github.workspace }}/thirdparty-install/include
          LIBRARY_PATH: ${{ github.workspace }}/thirdparty-install/lib
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/thirdparty-install" \
            -DCMAKE_INCLUDE_PATH="$GITHUB_WORKSPACE/thirdparty-install/include" \
            -DCMAKE_LIBRARY_PATH="$GITHUB_WORKSPACE/thirdparty-install/lib"

      - name: Build
        env:
          CPATH: ${{ github.workspace }}/thirdparty-install/include
          LIBRARY_PATH: ${{ github.workspace }}/thirdparty-install/lib
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Integration tests (gcc)
        run: tests/integration/run_tests.sh build/kiln

      - name: Integration tests (clang)
        run: tests/integration/run_tests.sh build/kiln clang++ clang

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Configure, build, and test
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

  build-alpine:
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20
    env:
      GLAZE_REF: main
      CLI11_REF: v2.4.2

    steps:
      - name: Install build deps
        run: |
          apk add --no-cache \
            build-base clang cmake ninja git pkgconf bash \
            linux-headers \
            curl-dev libarchive-dev pcre2-dev pugixml-dev \
            catch2-3 openssl-dev

      - uses: actions/checkout@v4

      - name: Cache third-party installs
        id: cache-thirdparty
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty-install
          key: thirdparty-alpine-3.20-glaze-${{ env.GLAZE_REF }}-cli11-${{ env.CLI11_REF }}-v1

      - name: Build & install glaze
        if: steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$GLAZE_REF" https://github.com/stephenberry/glaze.git /tmp/glaze
          cmake -S /tmp/glaze -B /tmp/glaze/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/thirdparty-install" \
            -Dglaze_BUILD_EXAMPLES=OFF
          cmake --install /tmp/glaze/build

      - name: Build & install CLI11
        if: steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$CLI11_REF" https://github.com/CLIUtils/CLI11.git /tmp/cli11
          cmake -S /tmp/cli11 -B /tmp/cli11/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/thirdparty-install" \
            -DCLI11_BUILD_TESTS=OFF -DCLI11_BUILD_EXAMPLES=OFF
          cmake --install /tmp/cli11/build

      - name: Configure
        env:
          CPATH: ${{ github.workspace }}/thirdparty-install/include
          LIBRARY_PATH: ${{ github.workspace }}/thirdparty-install/lib
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/thirdparty-install" \
            -DCMAKE_INCLUDE_PATH="$GITHUB_WORKSPACE/thirdparty-install/include" \
            -DCMAKE_LIBRARY_PATH="$GITHUB_WORKSPACE/thirdparty-install/lib"

      - name: Build
        env:
          CPATH: ${{ github.workspace }}/thirdparty-install/include
          LIBRARY_PATH: ${{ github.workspace }}/thirdparty-install/lib
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Integration tests (gcc)
        run: tests/integration/run_tests.sh build/kiln

      - name: Integration tests (clang)
        run: tests/integration/run_tests.sh build/kiln clang++ clang
